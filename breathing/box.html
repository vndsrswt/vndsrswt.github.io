<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Breathing - Vibrant</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #000000;
            --border-color: #f0f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            transition: background-color 1s ease;
        }

        .main-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Home Button */
        .home-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .home-link:hover {
            opacity: 1;
        }

        /* Visualizer */
        .visualizer-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        .box-wrap {
            position: relative;
            width: 320px;
            height: 320px;
            border: 2px solid rgba(0, 0, 0, 0.05);
            border-radius: 4rem;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            overflow: hidden;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-display {
            font-size: 8rem;
            font-weight: 800;
            color: var(--text-primary);
            z-index: 15;
            pointer-events: none;
            opacity: 0.8;
            transition: color 0.5s ease;
        }

        .progress-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: var(--text-primary);
            opacity: 0.1;
            transition: height 0.5s linear, background-color 0.5s ease;
        }

        .dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: var(--text-primary);
            border-radius: 50%;
            top: -8px;
            left: -8px;
            z-index: 20;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            transition: background-color 0.5s ease;
        }

        /* Instruction */
        .instruction {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            transition: all 0.5s ease;
            text-align: center;
        }

        /* Controls */
        .controls-overlay {
            position: absolute;
            bottom: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.5s ease;
        }

        .controls-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        .duration-control {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1rem;
            color: inherit;
        }

        .duration-control input {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: inherit;
            width: 40px;
            text-align: center;
            font-family: inherit;
            font-size: 1.2rem;
            padding: 0.4rem;
            border-radius: 0.5rem;
            outline: none;
        }

        .btn-toggle {
            background: white;
            border: none;
            color: black;
            padding: 1rem 3rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        /* Ambient Blobs */
        .blob {
            position: absolute;
            width: 80vw;
            height: 80vw;
            max-width: 800px;
            max-height: 800px;
            background: white;
            filter: blur(100px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 1;
            transition: all 2s ease;
            pointer-events: none;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        @media (max-width: 480px) {
            .box-wrap {
                width: 280px;
                height: 280px;
            }
            .timer-display {
                font-size: 6rem;
            }
            .instruction {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="home-link">← EXIT</a>

    <div id="blob" class="blob"></div>

    <div class="main-container">
        <div class="visualizer-wrap">
            <div id="box" class="box-wrap">
                <div id="timerDisplay" class="timer-display"></div>
                <div id="progress" class="progress-fill"></div>
                <div id="dot" class="dot"></div>
            </div>
            <div id="instruction" class="instruction">Ready</div>
        </div>

        <div id="controls" class="controls-overlay">
            <div class="duration-control">
                <span>Pace</span>
                <input type="number" id="duration" value="4" min="2" max="10">
                <span>seconds</span>
            </div>
            <button id="toggleBtn" class="btn-toggle">START SESSION</button>
        </div>
    </div>

    <script>
        const body = document.body;
        const instruction = document.getElementById('instruction');
        const dot = document.getElementById('dot');
        const box = document.getElementById('box');
        const progress = document.getElementById('progress');
        const timerDisplay = document.getElementById('timerDisplay');
        const toggleBtn = document.getElementById('toggleBtn');
        const durationInput = document.getElementById('duration');
        const controls = document.getElementById('controls');

        let isRunning = false;
        let countdownInterval;

        const colors = {
            inhale: { bg: '#F1F8E9', text: '#2D5A27' }, // Forest Green
            hold1:  { bg: '#FCF3CF', text: '#7D6608' }, // Sunlit Sand
            exhale: { bg: '#EBF5FB', text: '#1B4F72' }, // River Blue
            hold2:  { bg: '#EFEBE9', text: '#4E342E' }, // Mossy Earth
            ready:  { bg: '#ffffff', text: '#1a1a1a' }
        };

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function runCountdown(seconds, color) {
            return new Promise((resolve) => {
                let timeLeft = seconds;
                timerDisplay.textContent = timeLeft;
                timerDisplay.style.color = color;
                
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft >= 0) {
                        timerDisplay.textContent = timeLeft;
                    }
                    if (timeLeft <= 0) {
                        clearInterval(countdownInterval);
                        resolve();
                    }
                }, 1000);
            });
        }

        function updateUI(phase, duration) {
            const theme = colors[phase];
            body.style.backgroundColor = theme.bg;
            instruction.textContent = phase.charAt(0).toUpperCase() + phase.slice(1).replace(/\d/, '');
            instruction.style.color = theme.text;
            
            if (phase === 'inhale') {
                progress.style.transition = `height ${duration}ms linear`;
                progress.style.height = '100%';
                box.style.borderRadius = '50%';
            } else if (phase === 'exhale') {
                progress.style.transition = `height ${duration}ms linear`;
                progress.style.height = '0%';
                box.style.borderRadius = '4rem';
            }
            
            progress.style.backgroundColor = theme.text;
            dot.style.backgroundColor = theme.text;
        }

        async function startSession() {
            const d = parseInt(durationInput.value);
            const dMs = d * 1000;
            const size = box.offsetWidth;
            
            controls.classList.add('hidden');
            timerDisplay.style.opacity = '1';

            while (isRunning) {
                // Inhale
                updateUI('inhale', dMs);
                dot.style.transition = `transform ${dMs}ms linear`;
                dot.style.transform = `translateX(${size}px)`;
                await runCountdown(d, colors.inhale.text);
                if (!isRunning) break;

                // Hold
                updateUI('hold1', dMs);
                dot.style.transition = `transform ${dMs}ms linear`;
                dot.style.transform = `translate(${size}px, ${size}px)`;
                await runCountdown(d, colors.hold1.text);
                if (!isRunning) break;

                // Exhale
                updateUI('exhale', dMs);
                dot.style.transition = `transform ${dMs}ms linear`;
                dot.style.transform = `translate(0, ${size}px)`;
                await runCountdown(d, colors.exhale.text);
                if (!isRunning) break;

                // Hold
                updateUI('hold2', dMs);
                dot.style.transition = `transform ${dMs}ms linear`;
                dot.style.transform = `translate(0, 0)`;
                await runCountdown(d, colors.hold2.text);
            }
        }

        toggleBtn.addEventListener('click', () => {
            if (isRunning) {
                isRunning = false;
                clearInterval(countdownInterval);
                toggleBtn.textContent = "START SESSION";
                instruction.textContent = "Paused";
                timerDisplay.textContent = "";
                body.style.backgroundColor = 'white';
                dot.style.transition = "none";
                dot.style.transform = "translate(0,0)";
                progress.style.transition = "none";
                progress.style.height = "0%";
                box.style.borderRadius = '4rem';
                controls.classList.remove('hidden');
            } else {
                isRunning = true;
                toggleBtn.textContent = "STOP SESSION";
                startSession();
            }
        });
    </script>
</body>
</html>
