<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pursed-Lip Breathing - Nature</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nature-bg: #EFEBE9; /* Soft Earth */
            --nature-text: #4E342E;
            --nature-accent: #A1887F;
        }

        body {
            background-color: var(--nature-bg);
            color: var(--nature-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 1s ease;
        }

        .main-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .home-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .visualizer-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
        }

        .circle-wrap {
            position: relative;
            width: 320px;
            height: 320px;
            border: 2px solid rgba(0, 0, 0, 0.05);
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .breath-circle {
            width: 120px;
            height: 120px;
            background: var(--nature-text);
            border-radius: 50%;
            opacity: 0.2;
            transition: all 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .instruction {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.5s ease;
        }

        .timer-display {
            position: absolute;
            font-size: 5rem;
            font-weight: 800;
            opacity: 0.1;
            pointer-events: none;
        }

        .controls-overlay {
            position: absolute;
            bottom: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.5s ease;
        }

        .controls-overlay.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

        .btn-toggle {
            background: white;
            border: none;
            color: var(--nature-text);
            padding: 1rem 3rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .btn-toggle:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        @media (max-width: 480px) {
            .circle-wrap { width: 260px; height: 260px; }
            .instruction { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="home-link">← EXIT</a>

    <div class="main-container">
        <div class="visualizer-wrap">
            <div id="circleWrap" class="circle-wrap">
                <div id="timer" class="timer-display"></div>
                <div id="breathCircle" class="breath-circle"></div>
            </div>
            <div id="instruction" class="instruction">Ready</div>
        </div>

        <div id="controls" class="controls-overlay">
            <button id="toggleBtn" class="btn-toggle">START SESSION</button>
        </div>
    </div>

    <script>
        const instruction = document.getElementById('instruction');
        const breathCircle = document.getElementById('breathCircle');
        const timerDisplay = document.getElementById('timer');
        const toggleBtn = document.getElementById('toggleBtn');
        const controls = document.getElementById('controls');

        let isRunning = false;
        let countdownInterval;
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function runCountdown(seconds) {
            return new Promise((resolve) => {
                let timeLeft = seconds;
                timerDisplay.textContent = timeLeft;
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft >= 0) timerDisplay.textContent = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(countdownInterval);
                        resolve();
                    }
                }, 1000);
            });
        }

        async function startSession() {
            controls.classList.add('hidden');

            while (isRunning) {
                // Inhale (2s)
                instruction.textContent = "Inhale (Nose)";
                breathCircle.style.transform = "scale(2.5)";
                breathCircle.style.opacity = "0.4";
                await runCountdown(2);
                if (!isRunning) break;

                // Exhale (4s - Pursed Lips)
                instruction.textContent = "Exhale (Pursed Lips)";
                breathCircle.style.transform = "scale(1)";
                breathCircle.style.opacity = "0.1";
                await runCountdown(4);
                if (!isRunning) break;
            }
        }

        toggleBtn.addEventListener('click', () => {
            if (isRunning) {
                isRunning = false;
                clearInterval(countdownInterval);
                toggleBtn.textContent = "START SESSION";
                instruction.textContent = "Ready";
                timerDisplay.textContent = "";
                breathCircle.style.transform = "scale(1)";
                breathCircle.style.opacity = "0.1";
                controls.classList.remove('hidden');
            } else {
                isRunning = true;
                toggleBtn.textContent = "STOP SESSION";
                startSession();
            }
        });
    </script>
</body>
</html>
