<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternate Nostril Breathing - Nature</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nature-bg: #E1F5FE; /* Calm Water tint */
            --nature-text: #01579B;
            --nature-accent: #4FC3F7;
            --skin-tone: #FADBD8;
        }

        body {
            background-color: var(--nature-bg);
            color: var(--nature-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 1.5s ease;
        }

        .main-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .home-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            text-decoration: none;
            color: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 100;
        }

        .visualizer-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        .hand-circle {
            width: 380px;
            height: 380px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }

        /* Vishnu Mudra Hand */
        .hand {
            position: relative;
            width: 140px;
            height: 200px;
            background: linear-gradient(to bottom, #FFDAB9, #FADBD8);
            border-radius: 20% 20% 45% 45%;
            transform: translateY(40px) rotate(0deg);
            transition: all 1s ease;
        }

        .finger {
            position: absolute;
            background: inherit;
            width: 28px;
            border-radius: 14px;
            transform-origin: bottom center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid rgba(255,255,255,0.3);
        }

        .thumb { height: 80px; width: 34px; left: -30px; bottom: 40px; transform: rotate(-50deg); }
        .index { height: 95px; left: 5px; top: -85px; }
        .middle { height: 105px; left: 40px; top: -95px; }
        .ring { height: 100px; left: 75px; top: -90px; }
        .pinky { height: 80px; left: 110px; top: -70px; }

        /* Folded fingers for Vishnu Mudra */
        .hand.vishnu-mudra .index, .hand.vishnu-mudra .middle {
            transform: rotateX(160deg) translateY(-20px);
            opacity: 0.8;
            height: 80px;
        }

        /* Nose closing animations */
        .hand.close-right { transform: translateY(40px) translateX(-20px) rotate(10deg); }
        .hand.close-right .thumb { transform: rotate(-10deg) translateY(-40px) translateX(20px); }

        .hand.close-left { transform: translateY(40px) translateX(20px) rotate(-10deg); }
        .hand.close-left .ring, .hand.close-left .pinky { 
            transform: rotate(-15deg) translateY(-40px) translateX(-20px); 
        }

        .instruction {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            text-align: center;
            transition: all 0.5s ease;
            height: 2rem;
        }

        .controls-overlay {
            position: absolute;
            bottom: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.5s ease;
        }

        .controls-overlay.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

        .btn-toggle {
            background: white;
            border: none;
            color: var(--nature-text);
            padding: 1rem 3rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s;
        }

        .btn-toggle:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .timer-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 6px;
            background: var(--nature-text);
            width: 0%;
            transition: width linear;
        }

        @media (max-width: 480px) {
            .hand-circle { width: 300px; height: 300px; }
            .hand { width: 110px; height: 160px; }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="home-link">← EXIT</a>

    <div class="main-container">
        <div class="visualizer-wrap">
            <div class="hand-circle">
                <div id="hand" class="hand vishnu-mudra">
                    <div class="finger thumb"></div>
                    <div class="finger index"></div>
                    <div class="finger middle"></div>
                    <div class="finger ring"></div>
                    <div class="finger pinky"></div>
                </div>
            </div>
            <div id="instruction" class="instruction">Ready</div>
        </div>

        <div id="controls" class="controls-overlay">
            <button id="toggleBtn" class="btn-toggle">START SESSION</button>
        </div>

        <div id="timerBar" class="timer-bar"></div>
    </div>

    <script>
        const instruction = document.getElementById('instruction');
        const hand = document.getElementById('hand');
        const toggleBtn = document.getElementById('toggleBtn');
        const controls = document.getElementById('controls');
        const timerBar = document.getElementById('timerBar');

        let isRunning = false;
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function startSession() {
            controls.classList.add('hidden');
            const d = 4000; // 4 seconds per phase

            while (isRunning) {
                // 1. Close right, Inhale left
                instruction.textContent = "Close Right, Inhale Left";
                hand.className = "hand vishnu-mudra close-right";
                timerBar.style.transition = `width ${d}ms linear`;
                timerBar.style.width = "100%";
                await sleep(d);
                if (!isRunning) break;
                timerBar.style.transition = "none";
                timerBar.style.width = "0%";

                // 2. Close left, Exhale right
                instruction.textContent = "Close Left, Exhale Right";
                hand.className = "hand vishnu-mudra close-left";
                timerBar.style.transition = `width ${d}ms linear`;
                timerBar.style.width = "100%";
                await sleep(d);
                if (!isRunning) break;
                timerBar.style.transition = "none";
                timerBar.style.width = "0%";

                // 3. Keep left closed, Inhale right
                instruction.textContent = "Inhale Right";
                timerBar.style.transition = `width ${d}ms linear`;
                timerBar.style.width = "100%";
                await sleep(d);
                if (!isRunning) break;
                timerBar.style.transition = "none";
                timerBar.style.width = "0%";

                // 4. Close right, Exhale left
                instruction.textContent = "Close Right, Exhale Left";
                hand.className = "hand vishnu-mudra close-right";
                timerBar.style.transition = `width ${d}ms linear`;
                timerBar.style.width = "100%";
                await sleep(d);
                if (!isRunning) break;
                timerBar.style.transition = "none";
                timerBar.style.width = "0%";
            }
        }

        toggleBtn.addEventListener('click', () => {
            if (isRunning) {
                isRunning = false;
                toggleBtn.textContent = "START SESSION";
                instruction.textContent = "Ready";
                hand.className = "hand vishnu-mudra";
                controls.classList.remove('hidden');
                timerBar.style.transition = "none";
                timerBar.style.width = "0%";
            } else {
                isRunning = true;
                toggleBtn.textContent = "STOP SESSION";
                startSession();
            }
        });
    </script>
</body>
</html>
